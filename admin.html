<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back Home Brew - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b2f2f;
            --accent-color: #f5f0e8;
            --text-dark: #2c2c2c;
            --text-light: #6b6b6b;
            --white: #ffffff;
            --danger: #dc3545;
            --success: #28a745;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--accent-color);
            color: var(--text-dark);
            min-height: 100vh;
        }

        .admin-header {
            background: var(--primary-color);
            color: var(--white);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-family: 'Raleway', sans-serif;
            font-size: 1.5rem;
        }

        .admin-header a {
            color: var(--white);
            text-decoration: none;
            opacity: 0.8;
        }

        .admin-header a:hover { opacity: 1; }

        .admin-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .admin-section {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .admin-section h2 {
            font-family: 'Raleway', sans-serif;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.7rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .options-builder {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
        }

        .option-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: center;
        }

        .option-row input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .option-row input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-remove-option {
            background: var(--danger);
            color: var(--white);
            border: none;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .btn-add-option {
            background: none;
            border: 1px dashed #aaa;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: var(--text-light);
            font-size: 0.9rem;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn-add-option:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-primary {
            padding: 0.8rem 2rem;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            padding: 0.8rem 2rem;
            background: none;
            color: var(--text-light);
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .product-table {
            width: 100%;
            border-collapse: collapse;
        }

        .product-table th {
            text-align: left;
            padding: 0.8rem;
            border-bottom: 2px solid var(--accent-color);
            font-size: 0.85rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-table td {
            padding: 0.8rem;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }

        .product-table tr:hover {
            background: var(--accent-color);
        }

        .product-table img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
        }

        .btn-edit, .btn-delete {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-right: 0.3rem;
        }

        .btn-edit {
            background: #e8e0d4;
            color: var(--primary-color);
        }

        .btn-delete {
            background: #ffe0e0;
            color: var(--danger);
        }

        .btn-edit:hover { background: #d9cfc1; }
        .btn-delete:hover { background: #ffcccc; }

        .status-msg {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .status-msg.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status-msg.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .product-table { font-size: 0.85rem; }
            .product-table th:nth-child(3),
            .product-table td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <h1>Back Home Brew Admin</h1>
        <a href="store.html">&larr; Back to Store</a>
    </header>

    <div class="admin-container">
        <div id="status-msg" class="status-msg"></div>

        <div class="admin-section">
            <h2 id="form-title">Add New Product</h2>
            <form id="product-form" onsubmit="handleSubmit(event)">
                <input type="hidden" id="edit-id" value="">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="product_id">Product ID</label>
                        <input type="text" id="product_id" required placeholder="e.g. tshirt">
                    </div>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" required placeholder="e.g. Back Home Brew T-Shirt">
                    </div>
                    <div class="form-group full-width">
                        <label for="description">Description</label>
                        <textarea id="description" required placeholder="Short product description"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label for="image_url">Image URL</label>
                        <input type="url" id="image_url" required placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label for="btc_price">BTC Price</label>
                        <input type="number" id="btc_price" step="0.0001" min="0" required placeholder="0.0008">
                    </div>
                    <div class="form-group">
                        <label for="sats_price">Sats Price</label>
                        <input type="number" id="sats_price" min="0" required placeholder="80000">
                    </div>
                    <div class="form-group">
                        <label for="usd_price">USD Price</label>
                        <input type="number" id="usd_price" step="0.01" min="0" required placeholder="25.00">
                    </div>
                    <div class="form-group">
                        <label for="option_type">Option Type</label>
                        <select id="option_type" required>
                            <option value="size">Size</option>
                            <option value="color">Color</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Options</label>
                        <div class="options-builder" id="options-builder">
                            <div class="option-row">
                                <input type="text" placeholder="Value (e.g. S)" class="opt-value">
                                <input type="text" placeholder="Label (e.g. Small)" class="opt-label">
                                <button type="button" class="btn-remove-option" onclick="removeOptionRow(this)">&times;</button>
                            </div>
                        </div>
                        <button type="button" class="btn-add-option" onclick="addOptionRow()">+ Add Option</button>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="submit-btn">Add Product</button>
                    <button type="button" class="btn-secondary" onclick="resetForm()">Cancel</button>
                </div>
            </form>
        </div>

        <div class="admin-section">
            <h2>Products</h2>
            <div id="products-list">
                <div class="empty-state">Loading products...</div>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let editingId = null;

        function showStatus(message, type) {
            const el = document.getElementById('status-msg');
            el.textContent = message;
            el.className = 'status-msg ' + type;
            setTimeout(() => { el.className = 'status-msg'; }, 4000);
        }

        function addOptionRow() {
            const builder = document.getElementById('options-builder');
            const row = document.createElement('div');
            row.className = 'option-row';
            row.innerHTML = `
                <input type="text" placeholder="Value (e.g. S)" class="opt-value">
                <input type="text" placeholder="Label (e.g. Small)" class="opt-label">
                <button type="button" class="btn-remove-option" onclick="removeOptionRow(this)">&times;</button>
            `;
            builder.appendChild(row);
        }

        function removeOptionRow(btn) {
            const builder = document.getElementById('options-builder');
            if (builder.children.length > 1) {
                btn.parentElement.remove();
            }
        }

        function getOptionsFromForm() {
            const rows = document.querySelectorAll('#options-builder .option-row');
            const options = [];
            rows.forEach(row => {
                const value = row.querySelector('.opt-value').value.trim();
                const label = row.querySelector('.opt-label').value.trim();
                if (value && label) {
                    options.push({ value, label });
                }
            });
            return options;
        }

        function setOptionsInForm(options) {
            const builder = document.getElementById('options-builder');
            builder.innerHTML = '';
            options.forEach(opt => {
                const row = document.createElement('div');
                row.className = 'option-row';
                row.innerHTML = `
                    <input type="text" placeholder="Value" class="opt-value" value="${opt.value}">
                    <input type="text" placeholder="Label" class="opt-label" value="${opt.label}">
                    <button type="button" class="btn-remove-option" onclick="removeOptionRow(this)">&times;</button>
                `;
                builder.appendChild(row);
            });
            if (options.length === 0) addOptionRow();
        }

        function resetForm() {
            editingId = null;
            document.getElementById('edit-id').value = '';
            document.getElementById('product-form').reset();
            document.getElementById('form-title').textContent = 'Add New Product';
            document.getElementById('submit-btn').textContent = 'Add Product';
            document.getElementById('product_id').disabled = false;
            setOptionsInForm([]);
        }

        async function handleSubmit(e) {
            e.preventDefault();

            const options = getOptionsFromForm();
            if (options.length === 0) {
                showStatus('Please add at least one option.', 'error');
                return;
            }

            const productData = {
                product_id: document.getElementById('product_id').value.trim(),
                name: document.getElementById('name').value.trim(),
                description: document.getElementById('description').value.trim(),
                image_url: document.getElementById('image_url').value.trim(),
                btc_price: parseFloat(document.getElementById('btc_price').value),
                sats_price: parseInt(document.getElementById('sats_price').value),
                usd_price: parseFloat(document.getElementById('usd_price').value),
                option_type: document.getElementById('option_type').value,
                options: options
            };

            try {
                if (editingId) {
                    const { error } = await supabase
                        .from('products')
                        .update(productData)
                        .eq('id', editingId);
                    if (error) throw error;
                    showStatus('Product updated successfully!', 'success');
                } else {
                    const { error } = await supabase
                        .from('products')
                        .insert([productData]);
                    if (error) throw error;
                    showStatus('Product added successfully!', 'success');
                }
                resetForm();
                loadAdminProducts();
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
            }
        }

        async function loadAdminProducts() {
            const container = document.getElementById('products-list');

            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty-state">No products yet. Add one above!</div>';
                    return;
                }

                container.innerHTML = `
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>BTC</th>
                                <th>USD</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(p => `
                                <tr>
                                    <td><img src="${p.image_url}" alt="${p.name}"></td>
                                    <td><strong>${p.name}</strong><br><small style="color:#999">${p.product_id}</small></td>
                                    <td>${p.description}</td>
                                    <td>${p.btc_price}</td>
                                    <td>$${Number(p.usd_price).toFixed(2)}</td>
                                    <td>
                                        <button class="btn-edit" onclick="editProduct('${p.id}')">Edit</button>
                                        <button class="btn-delete" onclick="deleteProduct('${p.id}', '${p.name.replace(/'/g, "\\'")}')">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                container.innerHTML = `<div class="empty-state">Failed to load products: ${err.message}</div>`;
            }
        }

        async function editProduct(id) {
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .eq('id', id)
                    .single();

                if (error) throw error;

                editingId = id;
                document.getElementById('edit-id').value = id;
                document.getElementById('product_id').value = data.product_id;
                document.getElementById('product_id').disabled = true;
                document.getElementById('name').value = data.name;
                document.getElementById('description').value = data.description;
                document.getElementById('image_url').value = data.image_url;
                document.getElementById('btc_price').value = data.btc_price;
                document.getElementById('sats_price').value = data.sats_price;
                document.getElementById('usd_price').value = data.usd_price;
                document.getElementById('option_type').value = data.option_type;
                setOptionsInForm(data.options || []);

                document.getElementById('form-title').textContent = 'Edit Product';
                document.getElementById('submit-btn').textContent = 'Update Product';

                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                showStatus('Error loading product: ' + err.message, 'error');
            }
        }

        async function deleteProduct(id, name) {
            if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;

            try {
                const { error } = await supabase
                    .from('products')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                showStatus('Product deleted.', 'success');
                loadAdminProducts();
            } catch (err) {
                showStatus('Error deleting product: ' + err.message, 'error');
            }
        }

        // Load products on page load
        document.addEventListener('DOMContentLoaded', loadAdminProducts);
    </script>
</body>
</html>
